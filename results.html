<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#030608",
            text: "#eff7f8",
            muted: "#8ea2a8",
            cyan: "#69e7ff"
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="overflow-y-auto">
  <canvas id="stars" aria-hidden="true"></canvas>
  <div class="space-fade" aria-hidden="true"></div>
  <div id="crosshair" aria-hidden="true"></div>

  <header class="fixed left-0 top-0 z-20 w-full border-b border-white/10 bg-ink/55 backdrop-blur-xl">
    <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-5">
      <a class="aether-logo-small text-2xl font-extrabold" href="index.html">Aether</a>
      <a class="rounded-lg border border-white/10 px-4 py-2 text-sm font-semibold text-muted transition hover:border-cyan/50 hover:text-text" href="index.html">
        New search
      </a>
    </div>
  </header>

  <main class="mx-auto min-h-screen max-w-6xl px-5 pb-16 pt-28">
    <section class="mx-auto max-w-3xl text-center">
      <p class="text-sm font-semibold text-cyan">Search results</p>
      <h1 id="result-title" class="mt-3 text-4xl font-extrabold tracking-tight text-text sm:text-6xl">Searching...</h1>

      <form class="search-shell mx-auto mt-8 flex h-14 max-w-2xl items-center rounded-xl px-5 transition duration-300 sm:h-16" action="results.html" method="get" autocomplete="off">
        <input
          id="result-query"
          name="q"
          class="h-full w-full border-0 bg-transparent p-0 text-center text-base font-medium text-text placeholder:text-muted/70 focus:ring-0 sm:text-xl"
          type="text"
          placeholder="Search anything"
          required
        />
      </form>
    </section>

    <section class="mt-10 grid gap-4 md:grid-cols-3">
      <article class="result-card rounded-xl p-5">
        <p class="text-sm font-semibold text-muted">Confidence</p>
        <p id="confidence" class="mt-2 text-3xl font-extrabold text-text">--</p>
      </article>
      <article class="result-card rounded-xl p-5">
        <p class="text-sm font-semibold text-muted">Public matches</p>
        <p id="matches" class="mt-2 text-3xl font-extrabold text-text">--</p>
      </article>
      <article class="result-card rounded-xl p-5">
        <p class="text-sm font-semibold text-muted">Status</p>
        <p id="status" class="mt-2 text-3xl font-extrabold text-cyan">Scanning</p>
      </article>
    </section>

    <section class="mt-5 result-card rounded-xl p-5">
      <div class="mb-4 flex items-center justify-between gap-4">
        <h2 class="text-lg font-bold text-text">Sources</h2>
        <span id="scan-label" class="text-sm font-semibold text-muted">Loading</span>
      </div>
      <div id="source-list" class="space-y-4"></div>
    </section>

    <section class="mt-5 grid gap-5 lg:grid-cols-[1fr_360px]">
      <div class="result-card rounded-xl p-5">
        <h2 class="text-lg font-bold text-text">Public summary</h2>
        <div id="summary-list" class="mt-4 space-y-3"></div>
      </div>

      <aside class="result-card rounded-xl p-5">
        <h2 class="text-lg font-bold text-text">Notes</h2>
        <p class="mt-3 text-sm leading-6 text-muted">
          This page is a local interface demo. It does not scrape search engines or reveal private data.
        </p>
      </aside>
    </section>
  </main>

  <script src="assets/js/stars.js"></script>
  <script src="assets/js/results.js"></script>
</body>
</html>
